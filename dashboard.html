<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Miss Dina Fatehy</title>
    
    <!-- استدعاء المكتبات -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@500;700&display=swap');
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            min-height: 100vh; 
        }
        
        .en-font { 
            font-family: 'Poppins', sans-serif; 
        }

        .admin-card {
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 1rem; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        
        .input-admin {
            width: 100%; 
            padding: 0.75rem 1rem; 
            background: #0f172a;
            border: 1px solid #334155; 
            border-radius: 0.5rem; 
            color: white;
            transition: border-color 0.2s; 
            outline: none;
        }
        
        .input-admin:focus { 
            border-color: #6366f1; 
        }

        table { 
            border-collapse: separate; 
            border-spacing: 0; 
            width: 100%; 
        }
        
        th { 
            background-color: #334155; 
            color: #94a3b8; 
            font-weight: 600; 
            padding: 1rem; 
            text-align: right; 
        }
        
        td { 
            padding: 1rem; 
            border-bottom: 1px solid #334155; 
            vertical-align: middle; 
        }
        
        tr:hover td { 
            background-color: rgba(99, 102, 241, 0.05); 
        }
        
        th:first-child { 
            border-top-right-radius: 0.5rem; 
        }
        
        th:last-child { 
            border-top-left-radius: 0.5rem; 
        }

        .blocked-student td { 
            opacity: 0.5; 
            background-color: rgba(239, 68, 68, 0.05); 
        }
        
        #toast {
            position: fixed; 
            top: 20px; 
            right: 20px; 
            z-index: 9999;
            padding: 1rem 1.5rem; 
            border-radius: 0.5rem; 
            color: white;
            transform: translateX(150%); 
            transition: transform 0.4s;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); 
            font-weight: bold;
        }
        
        #toast.show { 
            transform: translateX(0); 
        }

        /* ستايل شاشة الأنيميشن */
        #introAnimation {
            transition: opacity 0.8s ease-in-out;
        }
        
        #introText {
            transition: opacity 0.5s ease-in-out;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <!-- شاشة الأنيميشن الترحيبية -->
    <div id="introAnimation" class="fixed inset-0 z-[10000] bg-[#0f172a] flex flex-col items-center justify-center">
        <h2 id="introText" class="text-3xl md:text-5xl font-black text-indigo-400 text-center leading-relaxed px-4 opacity-0"></h2>
    </div>

    <!-- نظام الإشعارات -->
    <div id="toast" class="bg-indigo-600 flex items-center gap-3">
        <i class="fas fa-info-circle text-xl"></i>
        <span id="toastMsg"></span>
    </div>

    <!-- شاشة تسجيل الدخول (مخفية في البداية لحد ما الأنيميشن يخلص) -->
    <div id="loginSection" class="hidden w-full max-w-md admin-card p-8 mt-10">
        <div class="text-center mb-8">
            <i class="fas fa-user-shield text-5xl text-indigo-500 mb-4"></i>
            <h2 class="en-font text-3xl font-bold">Admin Login</h2>
        </div>
        <form id="loginForm" class="space-y-5">
            <input type="text" id="username" required class="input-admin" placeholder="اسم المستخدم (admin)">
            <input type="password" id="password" required class="input-admin" placeholder="كلمة المرور (admin123)">
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg">
                دخول <i class="fas fa-sign-in-alt ml-2"></i>
            </button>
        </form>
    </div>

    <!-- لوحة التحكم الرئيسية -->
    <div id="dashboardSection" class="hidden w-full max-w-7xl flex flex-col gap-6 mt-4">
        
        <div class="admin-card p-6 flex flex-col md:flex-row justify-between items-center gap-4 bg-gradient-to-r from-slate-800 to-slate-900">
            <div>
                <h1 class="en-font text-3xl font-black text-indigo-400">Miss Dina Fatehy</h1>
                <p class="text-slate-400 text-sm">نظام الإدارة المنظم - على سنجة 10</p>
            </div>
            
            <div class="w-full md:w-1/3">
                <label class="block text-indigo-300 font-bold mb-2"><i class="fas fa-filter"></i> اختر الصف لعرض بياناته:</label>
                <select id="mainGradeFilter" class="input-admin border-indigo-500 text-lg cursor-pointer">
                    <option value="">-- يرجى اختيار الصف الدراسي --</option>
                    <option value="الأول الابتدائي">الأول الابتدائي</option>
                    <option value="الثاني الابتدائي">الثاني الابتدائي</option>
                    <option value="الثالث الابتدائي">الثالث الابتدائي</option>
                    <option value="الرابع الابتدائي">الرابع الابتدائي</option>
                    <option value="الخامس الابتدائي">الخامس الابتدائي</option>
                    <option value="السادس الابتدائي">السادس الابتدائي</option>
                    <option value="الأول الإعدادي">الأول الإعدادي</option>
                    <option value="الثاني الإعدادي">الثاني الإعدادي</option>
                    <option value="الثالث الإعدادي">الثالث الإعدادي</option>
                    <option value="الأول الثانوي">الأول الثانوي</option>
                </select>
            </div>
            
            <button onclick="logout()" class="bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white px-4 py-2 rounded-lg font-bold transition">خروج</button>
        </div>

        <div id="welcomeMessage" class="text-center py-20 text-slate-500 text-xl">
            <i class="fas fa-hand-pointer text-4xl mb-4 block"></i>
            برجاء اختيار الصف الدراسي من القائمة بالأعلى لعرض الطلبة والمواعيد.
        </div>

        <div id="gradeContent" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- عمود المواعيد -->
            <div class="lg:col-span-1 space-y-6">
                
                <div class="admin-card p-6 border-2 border-indigo-500/30">
                    <h3 class="text-lg font-bold mb-4 text-emerald-400 border-b border-slate-700 pb-2">
                        <i class="fas fa-magic"></i> بناء ميعاد سريع لـ <span id="lblAddGrade" class="text-white"></span>
                    </h3>
                    <div class="space-y-4">
                        <div class="flex gap-2">
                            <select id="day1" class="input-admin cursor-pointer p-2 w-1/2 text-sm">
                                <option value="السبت">السبت</option>
                                <option value="الأحد">الأحد</option>
                                <option value="الإثنين">الإثنين</option>
                                <option value="الثلاثاء">الثلاثاء</option>
                                <option value="الأربعاء">الأربعاء</option>
                                <option value="الخميس">الخميس</option>
                                <option value="الجمعة">الجمعة</option>
                            </select>
                            
                            <select id="day2" class="input-admin cursor-pointer p-2 w-1/2 text-sm">
                                <option value="والأربعاء">والأربعاء</option>
                                <option value="والخميس">والخميس</option>
                                <option value="والجمعة">والجمعة</option>
                                <option value="والسبت">والسبت</option>
                                <option value="والأحد">والأحد</option>
                                <option value="والإثنين">والإثنين</option>
                                <option value="والثلاثاء">والثلاثاء</option>
                                <option value="فقط">فقط (يوم واحد)</option>
                            </select>
                        </div>

                        <select id="groupTime" class="input-admin cursor-pointer">
                            <option value="الساعة 9:00 صباحاً">الساعة 9:00 صباحاً</option>
                            <option value="الساعة 10:00 صباحاً">الساعة 10:00 صباحاً</option>
                            <option value="الساعة 11:00 صباحاً">الساعة 11:00 صباحاً</option>
                            <option value="الساعة 12:00 ظهراً">الساعة 12:00 ظهراً</option>
                            <option value="الساعة 1:00 ظهراً">الساعة 1:00 ظهراً</option>
                            <option value="الساعة 2:00 ظهراً">الساعة 2:00 ظهراً</option>
                            <option value="الساعة 3:00 عصراً">الساعة 3:00 عصراً</option>
                            <option value="الساعة 4:00 عصراً">الساعة 4:00 عصراً</option>
                            <option value="الساعة 5:00 عصراً">الساعة 5:00 عصراً</option>
                            <option value="الساعة 6:00 مساءً">الساعة 6:00 مساءً</option>
                            <option value="الساعة 7:00 مساءً">الساعة 7:00 مساءً</option>
                            <option value="الساعة 8:00 مساءً">الساعة 8:00 مساءً</option>
                            <option value="الساعة 9:00 مساءً">الساعة 9:00 مساءً</option>
                        </select>

                        <button onclick="addNewGroup()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg font-bold shadow-lg transition">
                            <i class="fas fa-plus-circle"></i> إضافة الميعاد فوراً
                        </button>
                    </div>
                </div>

                <div class="admin-card p-6">
                    <h3 class="text-lg font-bold mb-4 text-indigo-400 border-b border-slate-700 pb-2">
                        <i class="fas fa-list"></i> المواعيد المسجلة
                    </h3>
                    <ul id="groupsList" class="space-y-2"></ul>
                </div>
            </div>

            <!-- عمود الطلبة -->
            <div class="lg:col-span-2 admin-card p-0 overflow-hidden">
                <div class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
                    <h3 class="text-xl font-bold text-pink-400">
                        <i class="fas fa-users"></i> طلبة <span id="lblStudentsGrade" class="text-white"></span>
                    </h3>
                    <span id="studentsCount" class="bg-indigo-600 px-3 py-1 rounded-full text-sm font-bold">0 طالب</span>
                </div>
                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم / الكود</th>
                                <th>الميعاد</th>
                                <th>ولي الأمر</th>
                                <th class="text-center">الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="studentsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- برمجة النظام -->
    <script>
        const _supabase = supabase.createClient('https://gxmadpzxcrfjuciclqhi.supabase.co', 'sb_publishable_uqVyUG_RVd8nb2xqlHmlpw_93HsqoPJ');
        let currentSelectedGrade = '';

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.className = isError ? 'bg-red-500 flex items-center gap-3 show' : 'bg-emerald-500 flex items-center gap-3 show';
            setTimeout(() => {
                t.classList.remove('show');
            }, 3000);
        }

        // تشغيل الأنيميشن أول ما الموقع يفتح
        window.onload = () => {
            const introSection = document.getElementById('introAnimation');
            const introText = document.getElementById('introText');
            
            const messages = [
                "مرحبا بك يا مس دينا فتحي في لوحه التحكم",
                "نتمنى ان يعجبك هذا الموقع",
                "واحنا بنجهز كل حاجه عشان تكون جاهزه ليكي"
            ];
            
            let msgIndex = 0;

            function playAnimation() {
                if (msgIndex < messages.length) {
                    introText.style.opacity = '0';
                    
                    setTimeout(() => {
                        introText.innerText = messages[msgIndex];
                        introText.style.opacity = '1';
                        msgIndex++;
                        
                        setTimeout(playAnimation, 2500); // الوقت اللي الجملة بتفضل ظاهرة فيه
                    }, 500);
                } else {
                    introSection.style.opacity = '0';
                    
                    setTimeout(() => {
                        introSection.classList.add('hidden');
                        
                        // بعد ما الأنيميشن يخلص، نشوف هيدخل على اللوحة ولا يسجل دخول
                        if(localStorage.getItem('DinaAdmin') === 'true') {
                            showDashboard(); 
                        } else {
                            document.getElementById('loginSection').classList.remove('hidden');
                        }
                    }, 800);
                }
            }
            
            playAnimation();
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const { data } = await _supabase.from('admin_users').select('*').eq('username', u).eq('password', p);
                if ((data && data.length > 0) || (u === 'admin' && p === 'admin123')) {
                    localStorage.setItem('DinaAdmin', 'true');
                    showDashboard();
                    showToast('تم تسجيل الدخول بنجاح');
                } else {
                    showToast('بيانات غير صحيحة', true);
                }
            } catch (err) {
                if(u === 'admin' && p === 'admin123') {
                    localStorage.setItem('DinaAdmin', 'true');
                    showDashboard();
                    showToast('تم الدخول بنجاح');
                } else {
                    showToast('خطأ في الاتصال بقاعدة البيانات', true);
                }
            }
        });

        function showDashboard() {
            document.body.classList.replace('justify-center', 'justify-start');
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
        }

        function logout() { 
            localStorage.removeItem('DinaAdmin'); 
            location.reload(); 
        }

        document.getElementById('mainGradeFilter').addEventListener('change', (e) => {
            currentSelectedGrade = e.target.value;
            if(!currentSelectedGrade) {
                document.getElementById('welcomeMessage').classList.remove('hidden');
                document.getElementById('gradeContent').classList.add('hidden');
                return;
            }
            document.getElementById('welcomeMessage').classList.add('hidden');
            document.getElementById('gradeContent').classList.remove('hidden');
            document.getElementById('lblAddGrade').innerText = currentSelectedGrade;
            document.getElementById('lblStudentsGrade').innerText = currentSelectedGrade;
            loadDataForGrade();
        });

        async function loadDataForGrade() {
            document.getElementById('studentsTable').innerHTML = '<tr><td colspan="4" class="text-center py-8">جاري التحميل...</td></tr>';
            
            const { data: groups } = await _supabase.from('groups').select('*').eq('grade', currentSelectedGrade);
            const groupsList = document.getElementById('groupsList');
            groupsList.innerHTML = '';
            
            if(groups && groups.length > 0) {
                groups.forEach(g => {
                    groupsList.innerHTML += `<li class="bg-slate-700 p-3 rounded flex justify-between items-center text-sm border border-slate-600">
                        <span class="font-bold text-emerald-300">${g.group_name}</span>
                        <button onclick="deleteGroup(${g.id})" class="text-red-400 hover:text-red-300 bg-red-400/10 px-2 py-1 rounded"><i class="fas fa-trash"></i></button>
                    </li>`;
                });
            } else {
                groupsList.innerHTML = '<li class="text-slate-500 text-sm">لا يوجد مواعيد مسجلة</li>';
            }

            const { data: students } = await _supabase.from('students_registration').select('*').like('grade', `${currentSelectedGrade}%`).order('created_at', { ascending: false });
            renderStudents(students || []);
        }

        function renderStudents(students) {
            const tbody = document.getElementById('studentsTable');
            document.getElementById('studentsCount').innerText = `${students.length} طالب`;
            tbody.innerHTML = '';
            
            if(students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-slate-500">لا يوجد طلاب</td></tr>';
                return;
            }

            students.forEach(s => {
                const isBlocked = s.status === 'blocked';
                const trClass = isBlocked ? 'blocked-student' : '';
                const blockIcon = isBlocked ? 'fa-unlock' : 'fa-ban';
                const blockAction = isBlocked ? 'active' : 'blocked';
                const waMsg = `نعتذر لحضرتك، تم اكتمال العدد في مجموعة (${s.grade}) للطالب ${s.name}.`;
                
                tbody.innerHTML += `
                    <tr class="${trClass}">
                        <td><div class="font-bold text-white">${s.name}</div><div class="text-xs text-indigo-300 mt-1">Code: ${s.student_code || 'بدون'}</div></td>
                        <td class="text-sm font-bold text-emerald-300">${s.grade.split(' - ')[1] || s.grade}</td>
                        <td dir="ltr" class="text-right font-mono">${s.parent_phone}</td>
                        <td class="text-center space-x-1 space-x-reverse min-w-[120px]">
                            <a href="https://wa.me/2${s.parent_phone}?text=${encodeURIComponent(waMsg)}" target="_blank" class="inline-block bg-green-600 hover:bg-green-500 text-white px-2 py-1 rounded text-xs"><i class="fab fa-whatsapp"></i></a>
                            <button onclick="removeStudent(${s.id}, '${s.name}')" class="bg-red-600 hover:bg-red-500 text-white px-2 py-1 rounded text-xs"><i class="fas fa-trash"></i></button>
                            <button onclick="updateStudentStatus(${s.id}, '${blockAction}')" class="bg-orange-600 hover:bg-orange-500 text-white px-2 py-1 rounded text-xs"><i class="fas ${blockIcon}"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

async function addNewGroup() {
    if (!currentSelectedGrade) {
        showToast('اختاري الصف الأول', true);
        return;
    }

    const d1 = document.getElementById('day1').value;
    const d2 = document.getElementById('day2').value;
    const time = document.getElementById('groupTime').value;

    const groupName =
        d2 === 'فقط'
            ? `${d1} - ${time}`
            : `${d1} ${d2} - ${time}`;

    const { error } = await _supabase
        .from('groups')
        .insert([{
            grade: currentSelectedGrade,
            group_name: groupName
        }]);

    if (error) {
        showToast('فشل إضافة الميعاد', true);
        return;
    }

    showToast('تم إضافة الميعاد بنجاح');
    loadDataForGrade();
}

async function deleteGroup(id) {
    if (!confirm('هل تريد حذف الميعاد؟')) return;

    const { error } = await _supabase
        .from('groups')
        .delete()
        .eq('id', id);

    if (error) {
        showToast('فشل الحذف', true);
        return;
    }

    showToast('تم حذف الميعاد');
    loadDataForGrade();
}

async function removeStudent(id, name) {
    if (!confirm(`حذف الطالب ${name} ؟`)) return;

    const { error } = await _supabase
        .from('students_registration')
        .delete()
        .eq('id', id);

    if (error) {
        showToast('فشل حذف الطالب', true);
        return;
    }

    showToast('تم حذف الطالب');
    loadDataForGrade();
}

async function updateStudentStatus(id, status) {
    const { error } = await _supabase
        .from('students_registration')
        .update({ status })
        .eq('id', id);

    if (error) {
        showToast('فشل تحديث الحالة', true);
        return;
    }

    showToast('تم تحديث الحالة');
    loadDataForGrade();
}    </script>
</body>
