<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ميس إنجليش 👑</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- صفحة تسجيل الدخول -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="glass w-full max-w-md rounded-2xl p-6 shadow-2xl text-center">
            <h2 class="text-2xl font-bold text-amber-400 mb-6">🔐 الدخول للوحة التحكم (ميس إنجليش)</h2>
            <input type="password" id="passInput" placeholder="أدخلي الرقم السري يا مس" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-center text-white focus:outline-none mb-4">
            <button onclick="checkPass()" class="w-full bg-amber-500 text-black font-bold py-3 rounded-xl shadow-lg">دخول 🔓</button>
            <a href="index.html" class="block text-sm text-slate-400 mt-4 hover:underline">⬅️ العودة لصفحة الطلاب</a>
        </div>
    </div>

    <!-- لوحة التحكم الرئيسية -->
    <div id="dashScreen" class="hidden max-w-6xl mx-auto space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-center glass p-6 rounded-2xl gap-4">
            <h1 class="text-2xl font-bold text-amber-400">👑 كشوفات الطلاب المحجوزين</h1>
            <div class="flex gap-2">
                <button onclick="changePassword()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold">🔧 تغيير الرقم السري</button>
                <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-sm font-bold">خروج Safe 🚪</button>
            </div>
        </div>

        <!-- فلاتر الصفوف -->
        <div class="grid grid-cols-2 md:grid-cols-6 gap-2" id="filterButtons">
            <button onclick="loadStudents('')" class="bg-amber-500 text-black font-bold py-2 rounded-xl">الكل ✨</button>
            <button onclick="loadStudents('1')" class="bg-slate-800 py-2 rounded-xl">أولى ابتدائي</button>
            <button onclick="loadStudents('2')" class="bg-slate-800 py-2 rounded-xl">تانية ابتدائي</button>
            <button onclick="loadStudents('3')" class="bg-slate-800 py-2 rounded-xl">تالتة ابتدائي</button>
            <button onclick="loadStudents('4')" class="bg-slate-800 py-2 rounded-xl">رابعة ابتدائي</button>
            <button onclick="loadStudents('5')" class="bg-slate-800 py-2 rounded-xl">خامسة ابتدائي</button>
            <button onclick="loadStudents('6')" class="bg-slate-800 py-2 rounded-xl">ستة ابتدائي</button>
        </div>

        <!-- الجدول -->
        <div class="glass rounded-2xl overflow-x-auto">
            <table class="w-full text-right border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-amber-400 border-b border-slate-700">
                        <th class="p-4">اسم الطالب</th>
                        <th class="p-4">رقم ولي الأمر</th>
                        <th class="p-4">الصف</th>
                        <th class="p-4 text-center">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="studentsTable">
                    <!-- البيانات هتنزل هنا -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://lhshvscofrestjvlespa.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoc2h2c2NvZnJlc3Rqdmxlc3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTkxNTYwNTIsImV4cCI6MjAzNDczMjA1Mn0.w-4u6XfV96yUfS3_vG_X-m-YvX6I4_43HsqoPJ76X-A";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            const currentPass = localStorage.getItem('mrs_pass') || '4321';
            if (pass === currentPass) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashScreen').classList.remove('hidden');
                loadStudents('');
            } else {
                alert("الرقم السري غلط يا مس! ارجعي لعموري المبرمج 👨‍💻");
            }
        }

        function changePassword() {
            const newPass = prompt("أدخلي الرقم السري الجديد:");
            if (newPass && newPass.trim() !== "") {
                localStorage.setItem('mrs_pass', newPass.trim());
                alert(`تم تغيير الرقم السري بنجاح إلى: ${newPass}`);
            }
        }

        function logout() {
            document.getElementById('dashScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('passInput').value = '';
        }

        async function loadStudents(gradeFilter) {
            const tbody = document.getElementById('studentsTable');
            tbody.innerHTML = `<tr><td colspan="4" class="text-center p-4">جاري تحميل كشوفات المس... ⏳</td></tr>`;

            let query = _supabase.from('students').select('*').order('created_at', { ascending: false });
            if (gradeFilter) query = query.eq('grade', gradeFilter);

            const { data, error } = await query;
            if (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center p-4 text-red-400">فشل تحميل البيانات!</td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center p-4 text-slate-400">لا يوجد طلاب مسجلين في هذا الصف بعد.</td></tr>`;
                return;
            }

            data.forEach(st => {
                tbody.innerHTML += `
                    <tr class="border-b border-slate-800 hover:bg-slate-800/50">
                        <td class="p-4 font-bold">${st.name}</td>
                        <td class="p-4 text-slate-300"><a href="tel:${st.phone}" class="hover:underline text-blue-400">${st.phone}</a></td>
                        <td class="p-4 text-amber-400 font-semibold">الصف ${st.grade}</td>
                        <td class="p-4 text-center">
                            <button onclick="deleteStudent(${st.id}, '${gradeFilter}')" class="bg-red-600/20 text-red-400 border border-red-600/30 px-3 py-1 rounded-lg text-xs hover:bg-red-600 hover:text-white transition">حذف</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function deleteStudent(id, currentFilter) {
            if(confirm("هل أنتِ متأكدة من حذف هذا الطالب من الكشف؟")) {
                await _supabase.from('students').delete().eq('id', id);
                loadStudents(currentFilter);
            }
        }
    </script>
</body>
</html>
