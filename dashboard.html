<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمارة التسجيل الملكية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            color: #f8fafc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh;
        }
        .card { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        input, select {
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center">

    <div class="card w-full max-w-lg rounded-3xl p-8">
        <h2 class="text-3xl font-black text-center text-amber-500 mb-8">تسجيل طلاب ميس إنجليش</h2>
        
        <form id="regForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">اسم الطالب بالكامل</label>
                <input type="text" id="name" required class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">رقم هاتف ولي الأمر</label>
                <input type="tel" id="phone" required class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">الصف الدراسي</label>
                <select id="grade" required class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                    <option value="">-- اختار صفك --</option>
                    <option value="1 إبتدائي">1 إبتدائي</option>
                    <option value="2 إبتدائي">2 إبتدائي</option>
                    <option value="3 إبتدائي">3 إبتدائي</option>
                    <option value="4 إبتدائي">4 إبتدائي</option>
                    <option value="5 إبتدائي">5 إبتدائي</option>
                    <option value="6 إبتدائي">6 إبتدائي</option>
                    <option value="1 إعدادي">1 إعدادي</option>
                    <option value="2 إعدادي">2 إعدادي</option>
                    <option value="3 إعدادي">3 إعدادي</option>
                    <option value="1 ثانوي">1 ثانوي</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-2">ميعاد المجموعة</label>
                <select id="group" required class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none">
                    <option value="">اختار الصف أولاً...</option>
                </select>
            </div>

            <button type="submit" id="btn" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-black p-4 rounded-2xl transition duration-300 transform hover:scale-105 active:scale-95">
                تأكيد التسجيل الآن
            </button>
        </form>
    </div>

    <script>
        const sb = supabase.createClient(
            "https://lhshvscofrestjvlespa.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoc2h2c2NvZnJlc3Rqdmxlc3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTkxNTYwNTIsImV4cCI6MjAzNDczMjA1Mn0.w-4u6XfV96yUfS3_vG_X-m-YvX6I4_43HsqoPJ76X-A"
        );

        // تحميل المجموعات بناءً على الصف
        document.getElementById('grade').addEventListener('change', async (e) => {
            const grp = document.getElementById('group');
            grp.innerHTML = '<option>جاري التحميل...</option>';
            
            const { data } = await sb.from('groups')
                .select('group_name')
                .eq('grade_level', e.target.value);
            
            grp.innerHTML = '<option value="">اختار الميعاد المناسب</option>';
            
            if(data && data.length > 0) {
                data.forEach(g => {
                    grp.innerHTML += `<option value="${g.group_name}">${g.group_name}</option>`;
                });
            } else {
                grp.innerHTML = '<option value="">المس لسه مضفتش مواعيد للصف ده</option>';
            }
        });

        // إرسال البيانات
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = "جاري الحفظ يا عموري...";

            const { error } = await sb.from('students').insert([{
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                grade: document.getElementById('grade').value + " - " + document.getElementById('group').value
            }]);

            if(error) {
                alert("حصلت مشكلة في السيرفر، جرب تاني يا بطل!");
                btn.disabled = false;
                btn.innerText = "تأكيد التسجيل الآن";
            } else {
                alert("تم تسجيلك في المجموعات بنجاح يا بطل! 🎉");
                location.reload();
            }
        });
    </script>
</body>
</html>
