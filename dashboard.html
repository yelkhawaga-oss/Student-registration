<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dina Fatehy - VIP System</title>
    
    <!-- ========================================== -->
    <!-- ============== المكتبات ================== -->
    <!-- ========================================== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- ========================================== -->
    <!-- ============== التنسيقات (CSS) ============= -->
    <!-- ========================================== -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Poppins:wght@300;400;500;700;900&display=swap');
        
        /* إعدادات عامة */
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark-bg);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .en-font { font-family: 'Poppins', sans-serif; }

        /* تأثيرات التحميل والشاشة الافتتاحية */
        #windows-splash {
            position: fixed; inset: 0; z-index: 99999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s ease-in-out;
        }
        
        .loader-spinner {
            width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%; border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite; margin-top: 20px; opacity: 0;
            transition: opacity 0.5s;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #splash-text {
            font-size: 2.5rem; font-weight: 300; color: white; text-align: center;
            opacity: 0; transition: opacity 1.5s ease-in-out; padding: 0 20px;
        }

        /* ستايل التسجيل (زجاجي فخم) */
        #view-registration {
            background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh; position: relative;
        }

        .glass-container {
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0; transform: translateY(20px); transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-container.show { opacity: 1; transform: translateY(0); }

        .premium-input {
            width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 1.2rem 1.2rem 1.2rem 3rem; border-radius: 1rem; color: white; outline: none;
            transition: all 0.3s; font-size: 1rem;
        }
        .premium-input:focus {
            border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            transform: translateY(-2px); background: rgba(15, 23, 42, 1);
        }

        /* فقاعات الخلفية */
        .blob { position: absolute; filter: blur(90px); border-radius: 50%; animation: float 12s infinite ease-in-out alternate; z-index: 0; }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: rgba(99, 102, 241, 0.2); }
        .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: rgba(236, 72, 153, 0.2); }
        .blob-3 { top: 40%; left: 40%; width: 300px; height: 300px; background: rgba(16, 185, 129, 0.1); animation-delay: -5s; }

        @keyframes float { 
            0% { transform: translate(0, 0) scale(1) rotate(0deg); } 
            100% { transform: translate(40px, 60px) scale(1.2) rotate(10deg); } 
        }

        /* ستايل لوحة التحكم */
        .admin-layout { display: flex; flex-direction: column; min-height: 100vh; }
        
        .admin-card { 
            background: var(--card-bg); border: 1px solid #334155; 
            border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); 
            transition: transform 0.3s;
        }
        .admin-card:hover { transform: translateY(-2px); }

        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-left: 4px solid var(--primary);
            padding: 1.5rem; border-radius: 0.75rem;
        }

        .input-admin {
            width: 100%; padding: 0.8rem 1.2rem; background: var(--dark-bg); 
            border: 1px solid #334155; border-radius: 0.5rem; color: white; 
            outline: none; transition: border-color 0.2s;
        }
        .input-admin:focus { border-color: var(--primary); }

        /* ستايل الجداول المتقدم */
        .table-container { overflow-x: auto; border-radius: 0.5rem; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; text-align: right; }
        th { background-color: #0f172a; color: var(--text-muted); font-weight: 700; padding: 1.2rem 1rem; border-bottom: 2px solid #334155; }
        td { padding: 1rem; border-bottom: 1px solid #334155; vertical-align: middle; transition: background 0.2s; }
        tr:hover td { background-color: rgba(99, 102, 241, 0.05); }
        .blocked-student td { opacity: 0.5; background-color: rgba(239, 68, 68, 0.05); }
        
        /* نظام الإشعارات */
        #unified-toast {
            position: fixed; top: 20px; right: 20px; z-index: 999999;
            padding: 1.2rem 2rem; border-radius: 0.75rem; color: white; font-weight: bold;
            transform: translateX(150%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
            box-shadow: 0 15px 30px -5px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px;
        }
        #unified-toast.show { transform: translateX(0); }

        /* نافذة التأكيد المنبثقة (Modal) */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 100000; display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--card-bg); border: 1px solid #334155; border-radius: 1rem;
            padding: 2rem; width: 90%; max-width: 400px; transform: scale(0.9); transition: all 0.3s;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

    </style>
</head>
<body>

    <!-- ========================================== -->
    <!-- ============== المكونات المشتركة ============ -->
    <!-- ========================================== -->
    
    <!-- إشعار النظام -->
    <div id="unified-toast">
        <i id="toastIcon" class="fas fa-info-circle text-2xl"></i>
        <div class="flex flex-col">
            <span id="toastTitle" class="text-sm opacity-80 en-font">Notification</span>
            <span id="toastMsg" class="text-lg"></span>
        </div>
    </div>

    <!-- نافذة تأكيد الحذف (Modal) -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content text-center">
            <i class="fas fa-exclamation-triangle text-5xl text-red-500 mb-4 block"></i>
            <h3 class="text-2xl font-bold mb-2">تأكيد الحذف</h3>
            <p id="modalText" class="text-slate-400 mb-6">هل أنت متأكد من هذا الإجراء؟ لا يمكن التراجع عنه.</p>
            <div class="flex gap-3 justify-center">
                <button onclick="ModalSystem.close()" class="px-6 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition">إلغاء</button>
                <button id="modalConfirmBtn" class="px-6 py-2 rounded-lg bg-red-600 hover:bg-red-500 transition font-bold">نعم، احذف</button>
            </div>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- ============== واجهة التسجيل (طالب) ======== -->
    <!-- ========================================== -->
    <div id="view-registration" class="flex flex-col items-center justify-center">
        
        <!-- شاشة التحميل الافتتاحية -->
        <div id="windows-splash">
            <h1 id="splash-text" class="en-font" dir="ltr"></h1>
            <div class="loader-spinner" id="splash-loader"></div>
        </div>

        <!-- ديكور الخلفية -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <div class="w-full max-w-xl p-4 relative z-10 hidden" id="main-content">
            <div class="glass-container p-8 lg:p-12" id="form-container">
                
                <!-- هيدر الفورمة -->
                <div class="text-center mb-10">
                    <div class="inline-block p-4 rounded-full bg-indigo-500/10 mb-4 border border-indigo-500/20">
                        <i class="fas fa-user-graduate text-4xl text-indigo-400"></i>
                    </div>
                    <h1 class="en-font text-4xl lg:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 mb-2">
                        Miss Dina Fatehy
                    </h1>
                    <p class="text-indigo-200 text-sm font-medium tracking-wide">STUDENT REGISTRATION PORTAL V2.0</p>
                </div>

                <!-- نموذج التسجيل -->
                <form id="registrationForm" class="space-y-6">
                    <div class="relative group">
                        <i class="fas fa-user absolute right-5 top-1/2 transform -translate-y-1/2 text-indigo-400 transition group-focus-within:text-indigo-300"></i>
                        <input type="text" id="studentName" required placeholder="اسم الطالب الرباعي (مطلوب)" class="premium-input pr-14">
                    </div>
                    
                    <div class="relative group">
                        <i class="fas fa-id-badge absolute right-5 top-1/2 transform -translate-y-1/2 text-indigo-400 transition group-focus-within:text-indigo-300"></i>
                        <input type="text" id="studentCode" placeholder="رقم الطالب التعريفي (إن وجد)" class="premium-input pr-14">
                    </div>
                    
                    <div class="relative group">
                        <i class="fas fa-phone-alt absolute right-5 top-1/2 transform -translate-y-1/2 text-indigo-400 transition group-focus-within:text-indigo-300"></i>
                        <input type="tel" id="parentPhone" required pattern="^01[0125][0-9]{8}$" title="يرجى إدخال رقم هاتف مصري صحيح (11 رقم)" placeholder="رقم هاتف ولي الأمر (01...)" class="premium-input pr-14 text-left font-mono" dir="ltr">
                    </div>
                    
                    <div class="relative group">
                        <i class="fas fa-layer-group absolute right-5 top-1/2 transform -translate-y-1/2 text-indigo-400 z-10 transition group-focus-within:text-indigo-300"></i>
                        <select id="gradeSelect" required class="premium-input pr-14 cursor-pointer appearance-none">
                            <option value="" disabled selected>اختر المرحلة والصف الدراسي...</option>
                            <optgroup label="المرحلة الابتدائية">
                                <option value="الأول الابتدائي">الأول الابتدائي</option>
                                <option value="الثاني الابتدائي">الثاني الابتدائي</option>
                                <option value="الثالث الابتدائي">الثالث الابتدائي</option>
                                <option value="الرابع الابتدائي">الرابع الابتدائي</option>
                                <option value="الخامس الابتدائي">الخامس الابتدائي</option>
                                <option value="السادس الابتدائي">السادس الابتدائي</option>
                            </optgroup>
                            <optgroup label="المرحلة الإعدادية">
                                <option value="الأول الإعدادي">الأول الإعدادي</option>
                                <option value="الثاني الإعدادي">الثاني الإعدادي</option>
                                <option value="الثالث الإعدادي">الثالث الإعدادي</option>
                            </optgroup>
                            <optgroup label="المرحلة الثانوية">
                                <option value="الأول الثانوي">الأول الثانوي</option>
                            </optgroup>
                        </select>
                        <i class="fas fa-chevron-down absolute left-5 top-1/2 transform -translate-y-1/2 text-slate-500 pointer-events-none"></i>
                    </div>
                    
                    <div class="relative group">
                        <i class="fas fa-clock absolute right-5 top-1/2 transform -translate-y-1/2 text-indigo-400 z-10"></i>
                        <select id="groupSelect" required disabled class="premium-input pr-14 cursor-pointer appearance-none opacity-50 bg-slate-800">
                            <option value="" disabled selected>برجاء تحديد الصف أولاً لعرض المواعيد...</option>
                        </select>
                        <i class="fas fa-chevron-down absolute left-5 top-1/2 transform -translate-y-1/2 text-slate-500 pointer-events-none"></i>
                    </div>

                    <!-- رسالة شروط -->
                    <div class="flex items-start gap-3 mt-4 text-sm text-slate-400">
                        <input type="checkbox" required id="terms" class="mt-1 accent-indigo-500 w-4 h-4 cursor-pointer">
                        <label for="terms" class="cursor-pointer">أقر بأن جميع البيانات المدخلة صحيحة، وأوافق على الالتزام بمواعيد الحضور والانصراف.</label>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full relative group overflow-hidden bg-indigo-600 text-white font-bold text-xl py-4 rounded-xl shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all hover:scale-[1.02] hover:shadow-[0_0_30px_rgba(79,70,229,0.5)] mt-4">
                        <span class="relative z-10 flex items-center justify-center gap-3">
                            <i class="fas fa-check-circle"></i> تسجيل البيانات الآن
                        </span>
                        <div class="absolute inset-0 h-full w-full bg-gradient-to-r from-indigo-500 to-purple-500 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                    </button>
                </form>
            </div>
            
            <div class="text-center mt-8 flex flex-col items-center gap-3">
                <p class="text-slate-500 text-sm en-font">Powered by System Architect &copy; 2026</p>
                <button type="button" onclick="AppNavigation.switchToAdmin()" class="text-slate-600 hover:text-indigo-400 text-sm transition-colors flex items-center gap-2">
                    <i class="fas fa-shield-alt"></i> الدخول للإدارة
                </button>
            </div>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- ============== واجهة الأدمن (الإدارة) ====== -->
    <!-- ========================================== -->
    <div id="view-admin" class="hidden admin-layout bg-[#0f172a]">
        
        <!-- شاشة التحميل للإدارة -->
        <div id="introAnimation" class="fixed inset-0 z-[10000] bg-[#0f172a] hidden flex-col items-center justify-center">
            <i class="fas fa-cog fa-spin text-6xl text-indigo-500 mb-6 opacity-80"></i>
            <h2 id="introText" class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 text-center leading-relaxed px-4 opacity-0"></h2>
        </div>

        <!-- البار العلوي للإدارة -->
        <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-lg">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-xl font-bold">D</div>
                    <div>
                        <h1 class="en-font text-xl font-bold text-white leading-tight">Admin Portal</h1>
                        <span class="text-xs text-emerald-400 flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> النظام متصل</span>
                    </div>
                </div>
                <button onclick="AppNavigation.switchToRegistration()" class="text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition flex items-center gap-2 text-sm">
                    <i class="fas fa-sign-out-alt rotate-180"></i> خروج للصفحة الرئيسية
                </button>
            </div>
        </nav>

        <!-- قسم تسجيل الدخول للأدمن -->
        <div id="loginSection" class="hidden flex-1 flex items-center justify-center p-4">
            <div class="w-full max-w-md admin-card p-10 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-700 shadow-inner">
                        <i class="fas fa-lock text-3xl text-indigo-400"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white">تسجيل الدخول للإدارة</h2>
                    <p class="text-sm text-slate-400 mt-2">يرجى إدخال بيانات الاعتماد الخاصة بك</p>
                </div>
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">اسم المستخدم</label>
                        <div class="relative">
                            <i class="fas fa-user absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                            <input type="text" id="username" required class="input-admin pr-10" placeholder="admin">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">كلمة المرور</label>
                        <div class="relative">
                            <i class="fas fa-key absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                            <input type="password" id="password" required class="input-admin pr-10" placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-lg py-3 rounded-lg mt-6 shadow-lg transition-colors flex justify-center items-center gap-2">
                        دخول <i class="fas fa-arrow-left"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- لوحة التحكم الفعلية (Dashboard) -->
        <div id="dashboardSection" class="hidden flex-1 p-4 md:p-8 max-w-screen-2xl mx-auto w-full flex-col gap-6">
            
            <!-- فلتر واحصائيات سريعة -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-2">
                <div class="admin-card p-6 md:col-span-2 flex flex-col justify-center">
                    <label class="block text-indigo-300 font-bold mb-3 text-lg"><i clas
