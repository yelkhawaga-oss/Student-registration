<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الطلاب</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>body { font-family: sans-serif; background-color: #0f172a; color: #f8fafc; }</style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">
    <form id="regForm" class="w-full max-w-sm space-y-4">
        <h2 class="text-xl font-bold text-center text-amber-400">استمارة تسجيل الطلاب</h2>
        <input type="text" id="studentName" placeholder="اسم الطالب" required class="w-full bg-slate-800 p-3 rounded-lg">
        <input type="tel" id="parentPhone" placeholder="رقم الهاتف" required class="w-full bg-slate-800 p-3 rounded-lg">
        <select id="gradeSelect" required class="w-full bg-slate-800 p-3 rounded-lg">
            <option value="">اختر الصف الدراسي</option>
            <option value="1 إبتدائي">1 إبتدائي</option>
            <option value="2 إبتدائي">2 إبتدائي</option>
            <option value="3 إبتدائي">3 إبتدائي</option>
            <option value="4 إبتدائي">4 إبتدائي</option>
            <option value="5 إبتدائي">5 إبتدائي</option>
            <option value="6 إبتدائي">6 إبتدائي</option>
            <option value="1 إعدادي">1 إعدادي</option>
            <option value="2 إعدادي">2 إعدادي</option>
            <option value="3 إعدادي">3 إعدادي</option>
            <option value="1 ثانوي">1 ثانوي</option>
        </select>
        <select id="groupSelect" required class="w-full bg-slate-800 p-3 rounded-lg">
            <option value="">اختر الميعاد</option>
        </select>
        <button type="submit" id="submitBtn" class="w-full bg-amber-500 p-3 rounded-lg font-bold">تسجيل</button>
    </form>
    <script>
        const _supabase = supabase.createClient(
            "https://lhshvscofrestjvlespa.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoc2h2c2NvZnJlc3Rqdmxlc3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTkxNTYwNTIsImV4cCI6MjAzNDczMjA1Mn0.w-4u6XfV96yUfS3_vG_X-m-YvX6I4_43HsqoPJ76X-A"
        );
        document.getElementById('gradeSelect').addEventListener('change', async (e) => {
            const grade = e.target.value;
            const groupSelect = document.getElementById('groupSelect');
            if (!grade) {
                groupSelect.innerHTML = '<option value="">اختر الميعاد</option>';
                return;
            }
            groupSelect.innerHTML = '<option value="">جاري تحميل المواعيد...</option>';
            const { data } = await _supabase.from('groups').select('group_name').eq('grade_level', grade);
            groupSelect.innerHTML = '<option value="">اختر الميعاد</option>';
            if (data && data.length > 0) {
                data.forEach(g => groupSelect.innerHTML += `<option value="${g.group_name}">${g.group_name}</option>');
            } else {
                groupSelect.innerHTML = '<option value="">التسجيل لسه المس مضفتش مجموعات</option>';
            }
        });
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";
            const { error } = await _supabase.from('students').insert([{
                name: document.getElementById('studentName').value,
                phone: document.getElementById('parentPhone').value,
                grade: document.getElementById('gradeSelect').value + " - " + document.getElementById('groupSelect').value
            }]);
            if (error) {
                alert("حدث خطأ");
                btn.disabled = false;
                btn.innerText = "تسجيل";
            } else {
                alert("تم التسجيل بنجاح");
                location.reload();
            }
        });
    </script>
</body>
</html>
