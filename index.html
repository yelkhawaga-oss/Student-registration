<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التسجيل | مس إنجليش</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .input-field { width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; padding: 0.75rem; border-radius: 0.5rem; color: white; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body class="p-4 py-10 flex flex-col items-center justify-center space-y-8">

    <div class="glass w-full max-w-xl rounded-2xl p-8 shadow-2xl relative">
        <h1 class="text-3xl font-black text-center text-amber-500 mb-6">حجز المواعيد والكشوفات</h1>
        
        <form id="regForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">اسم الطالب رباعي</label>
                <input type="text" id="studentName" required placeholder="اكتب الاسم هنا" class="input-field">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">رقم الطالب (الكود)</label>
                <input type="text" id="studentCode" required placeholder="أدخل كود الطالب" class="input-field">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">رقم هاتف ولي الأمر</label>
                <input type="tel" id="parentPhone" required placeholder="01xxxxxxxxx" class="input-field text-left" dir="ltr">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">الصف الدراسي</label>
                <select id="gradeSelect" required class="input-field">
                    <option value="">-- اختر الصف --</option>
                    <option value="1 إبتدائي">1 إبتدائي</option>
                    <option value="2 إبتدائي">2 إبتدائي</option>
                    <option value="3 إبتدائي">3 إبتدائي</option>
                    <option value="4 إبتدائي">4 إبتدائي</option>
                    <option value="5 إبتدائي">5 إبتدائي</option>
                    <option value="6 إبتدائي">6 إبتدائي</option>
                    <option value="1 إعدادي">1 إعدادي</option>
                    <option value="2 إعدادي">2 إعدادي</option>
                    <option value="3 إعدادي">3 إعدادي</option>
                    <option value="1 ثانوي">1 ثانوي</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-1">الميعاد المناسب</label>
                <select id="groupSelect" required class="input-field">
                    <option value="">اختر الصف أولاً...</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-lg transition mt-4">
                تأكيد الحجز والتسجيل
            </button>
        </form>
    </div>

    <div class="glass w-full max-w-xl rounded-2xl p-6 border-t-4 border-red-500">
        <h2 class="text-xl font-bold text-red-400 mb-4">هل ترغب في إلغاء حجزك؟</h2>
        <div class="flex flex-col md:flex-row gap-3">
            <input type="text" id="cancelCode" placeholder="كود الطالب" class="input-field">
            <input type="tel" id="cancelPhone" placeholder="رقم ولي الأمر" class="input-field text-left" dir="ltr">
            <button onclick="cancelRegistration()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg whitespace-nowrap">
                إلغاء الحجز
            </button>
        </div>
    </div>

    <div class="w-full max-w-xl text-center bg-slate-900 p-6 rounded-2xl border border-slate-700">
        <h3 class="text-lg font-bold text-white mb-2">للتواصل والاستفسارات</h3>
        <p class="text-amber-400 font-medium text-lg">📍 العنوان: القليوبية، بنها، الفلل</p>
        <p class="text-slate-400 mt-1">📞 للتواصل عبر الواتساب: (أضف رقم المس هنا)</p>
    </div>

    <script>
        const _supabase = supabase.createClient(
            "https://lhshvscofrestjvlespa.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoc2h2c2NvZnJlc3Rqdmxlc3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTkxNTYwNTIsImV4cCI6MjAzNDczMjA1Mn0.w-4u6XfV96yUfS3_vG_X-m-YvX6I4_43HsqoPJ76X-A"
        );

        // جلب المواعيد
        document.getElementById('gradeSelect').addEventListener('change', async (e) => {
            const grade = e.target.value;
            const groupSelect = document.getElementById('groupSelect');
            if (!grade) return groupSelect.innerHTML = '<option value="">اختر الصف أولاً...</option>';
            groupSelect.innerHTML = '<option value="">⏳ جاري التحميل...</option>';
            
            const { data } = await _supabase.from('groups').select('group_name').eq('grade_level', grade);
            groupSelect.innerHTML = '<option value="">-- اختر الميعاد --</option>';
            if (data && data.length > 0) {
                data.forEach(item => groupSelect.innerHTML += `<option value="${item.group_name}">${item.group_name}</option>`);
            } else {
                groupSelect.innerHTML = '<option value="">لا توجد مواعيد حالياً</option>';
            }
        });

        // التسجيل
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await _supabase.from('students_registration').insert([{
                name: document.getElementById('studentName').value,
                student_code: document.getElementById('studentCode').value,
                parent_phone: document.getElementById('parentPhone').value,
                grade: document.getElementById('gradeSelect').value + " - " + document.getElementById('groupSelect').value
            }]);
            
            if (error) alert("❌ خطأ في التسجيل!");
            else { alert("✅ تم تسجيلك بنجاح!"); document.getElementById('regForm').reset(); }
        });

        // إلغاء التسجيل
        async function cancelRegistration() {
            const code = document.getElementById('cancelCode').value;
            const phone = document.getElementById('cancelPhone').value;
            if (!code || !phone) return alert("الرجاء إدخال الكود ورقم الهاتف!");

            const { data } = await _supabase.from('students_registration').select('id').eq('student_code', code).eq('parent_phone', phone);
            
            if (data && data.length > 0) {
                if (confirm("هل أنت متأكد من إلغاء التسجيل؟")) {
                    await _supabase.from('students_registration').delete().eq('id', data[0].id);
                    alert("🗑️ تم إلغاء الحجز بنجاح.");
                    document.getElementById('cancelCode').value = '';
                    document.getElementById('cancelPhone').value = '';
                }
            } else {
                alert("❌ لم يتم العثور على حجز بهذه البيانات.");
            }
        }
    </script>
</body>
</html>
