<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Ms. Dina Fathy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-400 mb-2">Student Registration</h1>
            <p class="text-slate-400">Ms. Dina Fathy's Platform</p>
        </div>

        <form id="registrationForm" class="space-y-5">
            <!-- Student Name -->
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Full Student Name</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-3.5 text-slate-500"></i>
                    <input type="text" id="studentName" required class="w-full bg-slate-700 border border-slate-600 rounded-lg py-2.5 pl-10 pr-3 focus:outline-none focus:border-indigo-500 transition" placeholder="Enter your full name">
                </div>
            </div>

            <!-- Student Code -->
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Student Code (Optional)</label>
                <div class="relative">
                    <i class="fas fa-id-badge absolute left-3 top-3.5 text-slate-500"></i>
                    <input type="text" id="studentCode" class="w-full bg-slate-700 border border-slate-600 rounded-lg py-2.5 pl-10 pr-3 focus:outline-none focus:border-indigo-500 transition" placeholder="Enter code if available">
                </div>
            </div>

            <!-- Grade -->
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Grade Level</label>
                <div class="relative">
                    <i class="fas fa-graduation-cap absolute left-3 top-3.5 text-slate-500"></i>
                    <select id="gradeSelect" required class="w-full bg-slate-700 border border-slate-600 rounded-lg py-2.5 pl-10 pr-3 focus:outline-none focus:border-indigo-500 transition appearance-none">
                        <option value="">Select Grade...</option>
                        <option value="First Preparatory">First Preparatory</option>
                        <option value="Second Preparatory">Second Preparatory</option>
                        <option value="Third Preparatory">Third Preparatory</option>
                    </select>
                </div>
            </div>

            <!-- Group Time -->
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Preferred Time</label>
                <div class="relative">
                    <i class="fas fa-clock absolute left-3 top-3.5 text-slate-500"></i>
                    <select id="groupSelect" required disabled class="w-full bg-slate-700 border border-slate-600 rounded-lg py-2.5 pl-10 pr-3 focus:outline-none focus:border-indigo-500 transition appearance-none opacity-50 cursor-not-allowed">
                        <option value="">Select a grade first</option>
                    </select>
                </div>
            </div>

            <!-- Parent Phone -->
            <div>
                <label class="block text-sm font-medium mb-1 text-slate-300">Parent's Phone Number</label>
                <div class="relative">
                    <i class="fas fa-phone absolute left-3 top-3.5 text-slate-500"></i>
                    <input type="tel" id="parentPhone" required pattern="[0-9]{11}" class="w-full bg-slate-700 border border-slate-600 rounded-lg py-2.5 pl-10 pr-3 focus:outline-none focus:border-indigo-500 transition" placeholder="01xxxxxxxxx">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 mt-4 shadow-lg shadow-indigo-500/30">
                Confirm Registration <i class="fas fa-paper-plane ml-2"></i>
            </button>
        </form>

        <div id="successMsg" class="hidden mt-6 bg-emerald-900/50 border border-emerald-500 text-emerald-300 p-4 rounded-lg text-center">
            <i class="fas fa-check-circle text-2xl mb-2"></i>
            <p>Registration Successful! We will contact you soon.</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gxmadpzxcrfjuciclqhi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_wyVyUG_RVd8nb2xq1Hmlpw_43HsqoPJ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const gradeSelect = document.getElementById('gradeSelect');
        const groupSelect = document.getElementById('groupSelect');

        gradeSelect.addEventListener('change', async (e) => {
            const selectedGrade = e.target.value;
            groupSelect.innerHTML = '<option value="">Loading available times...</option>';
            groupSelect.disabled = true;
            groupSelect.classList.add('opacity-50', 'cursor-not-allowed');

            if (!selectedGrade) {
                groupSelect.innerHTML = '<option value="">Select a grade first</option>';
                return;
            }

            try {
                const { data, error } = await _supabase.from('groups').select('*').eq('grade', selectedGrade);
                if (error) throw error;

                groupSelect.innerHTML = '<option value="">Select Preferred Time...</option>';
                if (data && data.length > 0) {
                    data.forEach(group => {
                        groupSelect.innerHTML += `<option value="${group.group_name}">${group.group_name}</option>`;
                    });
                    groupSelect.disabled = false;
                    groupSelect.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {
                    groupSelect.innerHTML = '<option value="">No times available for this grade</option>';
                }
            } catch (err) {
                console.error(err);
                groupSelect.innerHTML = '<option value="">Error loading times. Try again.</option>';
            }
        });

        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Registering...';
            btn.disabled = true;

            const studentData = {
                name: document.getElementById('studentName').value,
                student_code: document.getElementById('studentCode').value || 'No Code',
                grade: document.getElementById('gradeSelect').value + ' - ' + document.getElementById('groupSelect').value,
                parent_phone: document.getElementById('parentPhone').value,
                status: 'active'
            };

            try {
                const { error } = await _supabase.from('students_registration').insert([studentData]);
                if (error) throw error;
                document.getElementById('registrationForm').classList.add('hidden');
                document.getElementById('successMsg').classList.remove('hidden');
            } catch (err) {
                alert('Registration Error: ' + err.message);
                btn.innerHTML = 'Confirm Registration <i class="fas fa-paper-plane ml-2"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
