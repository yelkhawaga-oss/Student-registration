<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الطلاب - ميس إنجليش</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md rounded-2xl p-6 shadow-2xl">
        <h2 class="text-2xl font-bold text-center text-amber-400 mb-6">👑 استمارة حجز المجموعات الملكية 👑</h2>
        <form id="regForm" class="space-y-4">
            <div>
                <label class="block text-slate-300 mb-2">اسم الطالب رباعي 👤</label>
                <input type="text" id="studentName" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500">
            </div>
            <div>
                <label class="block text-slate-300 mb-2">رقم هاتف ولي الأمر 📞</label>
                <input type="tel" id="parentPhone" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500">
            </div>
            <div>
                <label class="block text-slate-300 mb-2">السنة الدراسية للطالب 📚</label>
                <select id="studentGrade" required class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500">
                    <option value="">-- اختر الصف الدراسي --</option>
                    <!-- الابتدائي -->
                    <option value="1">الصف الأول الابتدائي</option>
                    <option value="2">الصف الثاني الابتدائي</option>
                    <option value="3">الصف الثالث الابتدائي</option>
                    <option value="4">الصف الرابع الابتدائي</option>
                    <option value="5">الصف الخامس الابتدائي</option>
                    <option value="6">الصف السادس الابتدائي</option>
                    <!-- الإعدادي -->
                    <option value="7">الصف الأول الإعدادي</option>
                    <option value="8">الصف الثاني الإعدادي</option>
                    <option value="9">الصف الثالث الإعدادي</option>
                    <!-- الثانوي -->
                    <option value="10">الصف الأول الثانوي</option>
                </select>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-amber-500 to-yellow-500 text-black font-bold py-3 rounded-xl shadow-lg transform transition active:scale-95">تأكيد الحجز الملوكي ✨</button>
        </form>
    </div>

    <script>
        const supabaseUrl = "https://lhshvscofrestjvlespa.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxoc2h2c2NvZnJlc3Rqdmxlc3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTkxNTYwNTIsImV4cCI6MjAzNDczMjA1Mn0.w-4u6XfV96yUfS3_vG_X-m-YvX6I4_43HsqoPJ76X-A";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "جاري إرسال بياناتك للمس... ⏳";

            const name = document.getElementById('studentName').value;
            const phone = document.getElementById('parentPhone').value;
            const grade = document.getElementById('studentGrade').value;

            const { data, error } = await _supabase.from('students').insert([{ name, phone, grade }]);

            if (error) {
                alert("حصلت مشكلة صغننة، جرب تاني يا بطل!");
                btn.disabled = false;
                btn.innerText = "تأكيد الحجز الملوكي ✨";
            } else {
                confetti();
                alert("مبروك! تم تسجيلك بنجاح في مجموعات ميس إنجليش الملكية 🎉");
                document.getElementById('regForm').reset();
                btn.disabled = false;
                btn.innerText = "تأكيد الحجز الملوكي ✨";
            }
        });
    </script>
</body>
</html>
